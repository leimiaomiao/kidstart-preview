<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格C：反讽正经风</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e0d4;display:flex;justify-content:center;padding:20px;min-height:100vh;font-family:'Noto Sans SC',sans-serif}
.phone{width:375px;min-height:750px;background:#fafaf8;border-radius:50px;box-shadow:0 20px 60px rgba(0,0,0,.1);overflow:hidden;border:8px solid #1a1a1a}
.notch{width:120px;height:32px;background:#1a1a1a;border-radius:0 0 20px 20px;margin:0 auto}
.screen{padding:16px 22px}
.header{margin:14px 0 8px}
.journal-title{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:900;color:#1a1a1a;letter-spacing:4px;border-bottom:3px double #1a1a1a;padding-bottom:8px;margin-bottom:4px}
.issue{font-size:11px;color:#666;letter-spacing:2px}
.headline{font-family:'Noto Serif SC',serif;font-size:15px;color:#1a1a1a;margin:16px 0 12px;padding-left:10px;border-left:4px solid #c41e3a}
.subject-card{background:#fff;border:1px solid #ddd;border-radius:4px;padding:20px;text-align:center;margin-bottom:16px}
.subject-id{font-size:11px;color:#999;letter-spacing:3px;margin-bottom:8px}
.subject-icon{font-size:64px;display:block;margin-bottom:8px}
.subject-name{font-family:'Noto Serif SC',serif;font-size:20px;color:#1a1a1a;font-weight:700}
.subject-meta{font-size:12px;color:#666;margin-top:4px}
.progress{width:70%;margin:10px auto 0;height:6px;background:#eee;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#c41e3a;width:65%;border-radius:3px}
.progress-text{font-size:10px;color:#999;text-align:center;margin-top:3px}
.report-btn{display:block;width:100%;padding:16px;background:#c41e3a;border:none;border-radius:4px;font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:16px;letter-spacing:4px;transition:background .2s}
.report-btn:active{background:#a01830}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.metric{background:#fff;border:1px solid #ddd;border-radius:4px;padding:12px 6px;text-align:center}
.metric-val{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:900;color:#1a1a1a}
.metric-unit{font-size:10px;color:#999;margin-top:2px;letter-spacing:1px}
.table-section{background:#fff;border:1px solid #ddd;border-radius:4px;padding:14px;margin-bottom:12px}
.table-header{display:flex;justify-content:space-between;font-size:10px;color:#999;letter-spacing:2px;padding-bottom:8px;border-bottom:1px solid #eee;margin-bottom:8px}
.table-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5}
.table-row:last-child{border:none}
.row-rank{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:900;color:#c41e3a;width:20px}
.row-icon{width:24px;height:24px;background:#f5f5f5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.row-name{flex:1;font-size:12px;color:#333}
.row-data{font-size:11px;color:#999}
.tab-bar{display:flex;justify-content:space-around;padding:10px 0 24px;border-top:1px solid #ddd;margin-top:8px}
.tab{text-align:center;color:#999;font-size:10px;letter-spacing:1px}
.tab.active{color:#c41e3a}
.tab .icon{font-size:18px;display:block;margin-bottom:2px}
.footnote{font-size:9px;color:#bbb;text-align:center;margin-top:8px;font-style:italic}
.stamp{position:absolute;top:60px;right:20px;color:#c41e3a;border:2px solid #c41e3a;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;transform:rotate(15deg);opacity:.6;letter-spacing:1px}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen" style="position:relative">
    <div class="header">
      <div class="journal-title">排 便 研 究 所</div>
      <div class="issue">LALAME INSTITUTE · VOL.12 · 2026.03.28</div>
    </div>
    <div class="stamp">已认<br>证</div>

    <div class="headline">实验体状态报告</div>
    <div class="subject-card">
      <div class="subject-id">SUBJECT No. 1024</div>
      <span class="subject-icon">💩</span>
      <div class="subject-name">小软团 二级研究员</div>
      <div class="subject-meta">累计实验 9 次 · 入所第 12 天</div>
      <div class="progress"><div class="progress-fill"></div></div>
      <div class="progress-text">距晋升三级研究员：尚需 35 EXP</div>
    </div>

    <button class="report-btn">📋 提 交 报 告</button>

    <div class="metrics">
      <div class="metric"><div class="metric-val">1</div><div class="metric-unit">今日报告</div></div>
      <div class="metric"><div class="metric-val">3</div><div class="metric-unit">连续天数</div></div>
      <div class="metric"><div class="metric-val">🍌</div><div class="metric-unit">末次形态</div></div>
    </div>

    <div class="headline">今日学术排行</div>
    <div class="table-section">
      <div class="table-header"><span>排名</span><span>研究员</span><span>提交时间</span></div>
      <div class="table-row"><span class="row-rank">01</span><div class="row-icon">💩</div><span class="row-name">研究员#3721</span><span class="row-data">06:32</span></div>
      <div class="table-row"><span class="row-rank">02</span><div class="row-icon">💩</div><span class="row-name">研究员#8842</span><span class="row-data">07:15</span></div>
      <div class="table-row"><span class="row-rank">03</span><div class="row-icon">💩</div><span class="row-name">本人 ←</span><span class="row-data">08:41</span></div>
    </div>

    <div class="footnote">※ 本所不提供医疗建议，仅供学术交流（认真脸）</div>

    <div class="tab-bar">
      <div class="tab active"><span class="icon">🏠</span>首页</div>
      <div class="tab"><span class="icon">📊</span>数据</div>
      <div class="tab"><span class="icon">💬</span>学术交流</div>
      <div class="tab"><span class="icon">👤</span>档案</div>
    </div>
  </div>
</div>
</body>
</html>
