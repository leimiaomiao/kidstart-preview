<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格C：反讽正经风</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#f0f2f5;display:flex;justify-content:center;padding:20px;min-height:100vh}
.phone{width:375px;min-height:750px;background:#fff;border-radius:50px;box-shadow:0 20px 60px rgba(0,0,0,.1);overflow:hidden;border:8px solid #1a1a1a;position:relative}
.notch{width:120px;height:32px;background:#1a1a1a;border-radius:0 0 20px 20px;margin:0 auto}
.screen{padding:20px 24px}
.header-bar{background:#1a6b4a;margin:-20px -24px 16px;padding:16px 24px 12px;color:#fff}
h1{font-family:'Noto Serif SC',serif;font-size:22px;color:#fff;font-weight:700}
.subtitle{color:rgba(255,255,255,.7);font-size:11px;margin-top:2px;letter-spacing:1px}
.paper{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.paper-title{font-family:'Noto Serif SC',serif;font-size:14px;color:#1a1a1a;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #1a6b4a}
.pet-section{text-align:center;padding:16px 0}
.pet{font-size:56px;display:block;margin-bottom:6px}
.specimen-label{font-size:10px;color:#666;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.pet-name{font-family:'Noto Serif SC',serif;font-size:18px;color:#1a1a1a;font-weight:700}
.classification{font-size:11px;color:#666;font-style:italic;margin-top:2px}
.progress{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px}
.progress-bar{width:120px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1a6b4a;width:65%;border-radius:3px}
.progress-text{font-size:10px;color:#666}
.big-btn{display:block;width:100%;padding:16px;background:#1a6b4a;border:none;border-radius:12px;font-family:'Noto Serif SC',serif;font-size:18px;color:#fff;cursor:pointer;text-align:center;margin-bottom:14px;letter-spacing:2px;font-weight:700}
.big-btn:active{background:#145539}
.data-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#d0d7de;border:1px solid #d0d7de;border-radius:8px;overflow:hidden;margin-bottom:14px}
.data-cell{background:#fff;padding:12px 6px;text-align:center}
.data-num{font-family:'Noto Serif SC',serif;font-size:22px;color:#1a1a1a;font-weight:700}
.data-label{font-size:10px;color:#666;margin-top:2px}
.table-header{display:flex;padding:6px 0;border-bottom:1px solid #d0d7de;font-size:11px;color:#666;font-weight:700}
.table-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.table-row:last-child{border:none}
.col-rank{width:30px;text-align:center;font-family:'Noto Serif SC',serif;font-weight:700;color:#1a6b4a}
.col-id{flex:1;font-size:12px;color:#1a1a1a;padding-left:8px}
.col-time{width:50px;font-size:11px;color:#666;text-align:right}
.footnote{font-size:9px;color:#999;text-align:center;margin-top:8px;font-style:italic}
.tab-bar{display:flex;justify-content:space-around;padding:10px 0 28px;border-top:1px solid #d0d7de;margin-top:8px}
.tab-item{text-align:center;font-size:10px;color:#999}
.tab-item.active{color:#1a6b4a}
.tab-item .icon{font-size:18px;display:block;margin-bottom:2px}
.stamp{position:absolute;top:90px;right:30px;font-size:10px;color:#cc0000;border:2px solid #cc0000;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;transform:rotate(15deg);opacity:.3;font-weight:700;line-height:1.1;text-align:center}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="header-bar">
      <h1>排泄研究所 🔬</h1>
      <div class="subtitle">NATIONAL INSTITUTE OF DEFECATION SCIENCE</div>
    </div>

    <div class="paper">
      <div class="paper-title">受试者档案 — 实验体 #1024</div>
      <div class="pet-section">
        <div class="specimen-label">SPECIMEN STATUS</div>
        <span class="pet">💩</span>
        <div class="pet-name">小软团</div>
        <div class="classification">分类：Feces Softicus · 等级 II</div>
        <div class="progress">
          <span class="progress-text">进化进度</span>
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <span class="progress-text">65%</span>
        </div>
      </div>
    </div>

    <button class="big-btn">📋 提交排泄报告</button>

    <div class="data-grid">
      <div class="data-cell"><div class="data-num">1</div><div class="data-label">今日样本</div></div>
      <div class="data-cell"><div class="data-num">3</div><div class="data-label">连续观测日</div></div>
      <div class="data-cell"><div class="data-num">IV</div><div class="data-label">上次分型</div></div>
    </div>

    <div class="paper">
      <div class="paper-title">今日排泄效率排行 (n=1,247)</div>
      <div class="table-header"><span class="col-rank">#</span><span class="col-id">受试者编号</span><span class="col-time">时间</span></div>
      <div class="table-row"><span class="col-rank">1</span><span class="col-id">受试者 #3721</span><span class="col-time">06:32</span></div>
      <div class="table-row"><span class="col-rank">2</span><span class="col-id">受试者 #8842</span><span class="col-time">07:15</span></div>
      <div class="table-row"><span class="col-rank">3</span><span class="col-id">受试者 #1024 (您)</span><span class="col-time">08:41</span></div>
      <div class="footnote">* 数据来源：拉了吗排泄行为大数据中心 · p < 0.05</div>
    </div>

    <div class="tab-bar">
      <div class="tab-item active"><span class="icon">🏠</span>首页</div>
      <div class="tab-item"><span class="icon">📊</span>数据</div>
      <div class="tab-item"><span class="icon">💬</span>病友圈</div>
      <div class="tab-item"><span class="icon">👤</span>档案</div>
    </div>
  </div>
  <div class="stamp">已审<br>批</div>
</div>
</body>
</html>
