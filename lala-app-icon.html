<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拉了吗 App Icon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5ede3;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:40px}
h1{font-size:20px;color:#5a3e28;text-align:center}
.icons{display:flex;flex-wrap:wrap;gap:32px;justify-content:center}
.icon-wrap{text-align:center}
.icon-label{font-size:12px;color:#8a7560;margin-top:8px}
/* Icon 样式 */
.app-icon{width:120px;height:120px;border-radius:26px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.v1{background:linear-gradient(135deg,#faf5ee 0%,#f0e6d4 100%);border:3px solid #c9b99a}
.v1 .roll{font-size:56px;position:relative;z-index:1;filter:drop-shadow(1px 2px 0 rgba(90,62,40,.2))}
.v1 .face{position:absolute;font-size:16px;top:38px;left:50%;transform:translateX(-50%);z-index:2}
.v1::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='30' height='30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h30v30H0z' fill='none'/%3E%3Cpath d='M15 0v30M0 15h30' stroke='%23e0d5c5' stroke-width='.3'/%3E%3C/svg%3E")}
.v2{background:linear-gradient(135deg,#fff8ee 0%,#ffe8c4 100%);border:3px solid #e8a84c}
.v2 .tp{font-size:60px;filter:drop-shadow(2px 2px 0 rgba(90,62,40,.15))}
.v2 .poop-small{position:absolute;bottom:18px;right:18px;font-size:24px;transform:rotate(15deg)}
.v3{background:#5a3e28;border:3px solid #3d2815}
.v3 .tp{font-size:58px;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.3))}
.v3 .text{position:absolute;bottom:14px;font-size:11px;color:#f0e6d4;font-weight:700;letter-spacing:1px}
.v4{background:linear-gradient(135deg,#faf5ee,#f5ede3);border:3px solid #c9b99a;flex-direction:column;gap:2px}
.v4 .combo{display:flex;align-items:center;gap:4px}
.v4 .combo span:first-child{font-size:36px}
.v4 .combo span:last-child{font-size:28px}
.v4 .text{font-size:9px;color:#8a7560;font-weight:700;letter-spacing:3px;margin-top:2px}
</style>
</head>
<body>
<h1>🧻 「拉了吗」App Icon 方案</h1>
<div class="icons">
  <div class="icon-wrap">
    <div class="app-icon v1">
      <span class="roll">🧻</span>
      <span class="face">😊</span>
    </div>
    <div class="icon-label">A. 微笑抽纸（推荐）</div>
  </div>
  <div class="icon-wrap">
    <div class="app-icon v2">
      <span class="tp">🧻</span>
      <span class="poop-small">💩</span>
    </div>
    <div class="icon-label">B. 抽纸+小便便</div>
  </div>
  <div class="icon-wrap">
    <div class="app-icon v3">
      <span class="tp">🧻</span>
      <span class="text">拉了吗</span>
    </div>
    <div class="icon-label">C. 深色底+文字</div>
  </div>
  <div class="icon-wrap">
    <div class="app-icon v4">
      <div class="combo"><span>🧻</span><span>💩</span></div>
      <span class="text">拉了吗</span>
    </div>
    <div class="icon-label">D. 组合款</div>
  </div>
</div>
</body>
</html>
