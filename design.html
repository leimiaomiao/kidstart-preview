<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍊 KidStart V5 设计文档</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<style>
body { font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 750px; margin: 0 auto; padding: 16px; background: #f8f9fa; color: #333; line-height: 1.7; }
h1,h2,h3 { color: #222; }
h1 { font-size: 22px; border-bottom: 3px solid #FF9F43; padding-bottom: 8px; }
h2 { font-size: 18px; margin-top: 32px; }
h3 { font-size: 16px; color: #FF6B6B; }
table { width: 100%; border-collapse: collapse; font-size: 13px; overflow-x: auto; display: block; }
th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
th { background: #FFF3E0; }
code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
pre { background: #2d2d2d; color: #f8f8f2; padding: 16px; border-radius: 12px; overflow-x: auto; font-size: 13px; }
pre code { background: none; color: inherit; }
blockquote { border-left: 4px solid #FF9F43; padding-left: 12px; color: #666; margin: 16px 0; }
.mermaid { background: #fff; padding: 16px; border-radius: 12px; margin: 16px 0; }
</style>
</head>
<body>
<div id="content"></div>
<script>
mermaid.initialize({ startOnLoad: false, theme: 'default' });
fetch('design-v5.md').then(r=>r.text()).then(md=>{
  document.getElementById('content').innerHTML = marked.parse(md);
  document.querySelectorAll('.language-mermaid').forEach(el=>{
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.parentElement.replaceWith(div);
  });
  mermaid.run();
});
</script>
</body>
</html>
