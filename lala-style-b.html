<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格B：像素风</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#2a1f3d;display:flex;justify-content:center;padding:20px;min-height:100vh}
.phone{width:375px;min-height:750px;background:#1a1028;border-radius:50px;box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden;border:8px solid #111;position:relative}
.notch{width:120px;height:32px;background:#111;border-radius:0 0 20px 20px;margin:0 auto}
.screen{padding:20px 24px}
h1{font-family:'ZCOOL KuaiLe',cursive;font-size:28px;color:#ffde59;margin:16px 0 4px;text-shadow:2px 2px 0 #7b5e00}
.subtitle{color:#a78bdb;font-size:12px;margin-bottom:20px;letter-spacing:2px}
.pet-area{background:#241a38;border:3px solid #4a3570;border-radius:20px;padding:24px;text-align:center;margin-bottom:16px;image-rendering:pixelated;position:relative;overflow:hidden}
.pet-area::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none}
.pet{font-size:64px;display:block;margin-bottom:8px;animation:bounce 1s steps(4) infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.pet-name{font-family:'ZCOOL KuaiLe',cursive;font-size:18px;color:#ffde59}
.pet-level{font-size:11px;color:#a78bdb;margin-top:4px}
.hp-bar{width:70%;margin:8px auto 0;height:12px;background:#0a0612;border:2px solid #4a3570;border-radius:2px;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffde59,#69ff69);width:65%}
.big-btn{display:block;width:100%;padding:18px;background:linear-gradient(180deg,#ff6bab,#ff4785);border:3px solid #fff;border-radius:16px;font-family:'ZCOOL KuaiLe',cursive;font-size:22px;color:#fff;cursor:pointer;text-align:center;margin-bottom:16px;box-shadow:0 4px 0 #b8004a,0 6px 12px rgba(255,71,133,.3);text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.big-btn:active{box-shadow:0 2px 0 #b8004a;transform:translateY(2px)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:#241a38;border:2px solid #4a3570;border-radius:12px;padding:12px 6px;text-align:center}
.stat-num{font-family:'ZCOOL KuaiLe',cursive;font-size:22px;color:#69ff69}
.stat-label{font-size:10px;color:#a78bdb;margin-top:2px}
.rank-card{background:#241a38;border:2px solid #4a3570;border-radius:16px;padding:14px}
.rank-title{font-family:'ZCOOL KuaiLe',cursive;font-size:15px;color:#ffde59;margin-bottom:10px}
.rank-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #30244a}
.rank-item:last-child{border:none}
.rank-num{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;width:18px;color:#ff6bab}
.rank-name{flex:1;font-size:12px;color:#e0d0ff}
.rank-time{font-size:10px;color:#a78bdb}
.tab-bar{display:flex;justify-content:space-around;padding:10px 0 28px;border-top:2px solid #4a3570;margin-top:12px}
.tab-item{text-align:center;font-size:10px;color:#a78bdb}
.tab-item.active{color:#ffde59}
.tab-item .icon{font-size:18px;display:block;margin-bottom:2px}
.coin{display:inline-block;font-size:9px;background:#ffde59;color:#1a1028;padding:1px 5px;border-radius:6px;font-weight:bold;margin-left:3px}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <h1>拉了吗 🎮</h1>
    <p class="subtitle">▶ PRESS START TO POOP</p>

    <div class="pet-area">
      <span class="pet">💩</span>
      <div class="pet-name">小软团 ★★☆☆☆</div>
      <div class="pet-level">LV.2 | EXP 65/100 <span class="coin">+10</span></div>
      <div class="hp-bar"><div class="hp-fill"></div></div>
    </div>

    <button class="big-btn">💩 START!</button>

    <div class="stats">
      <div class="stat"><div class="stat-num">1</div><div class="stat-label">TODAY</div></div>
      <div class="stat"><div class="stat-num">3🔥</div><div class="stat-label">COMBO</div></div>
      <div class="stat"><div class="stat-num">🍌</div><div class="stat-label">LAST</div></div>
    </div>

    <div class="rank-card">
      <div class="rank-title">🏆 HIGH SCORE</div>
      <div class="rank-item"><span class="rank-num">1</span><span>💩</span><span class="rank-name">便便#3721</span><span class="rank-time">06:32</span></div>
      <div class="rank-item"><span class="rank-num">2</span><span>💩</span><span class="rank-name">便便#8842</span><span class="rank-time">07:15</span></div>
      <div class="rank-item"><span class="rank-num">3</span><span>💩</span><span class="rank-name">★ 我 ★</span><span class="rank-time">08:41</span></div>
    </div>

    <div class="tab-bar">
      <div class="tab-item active"><span class="icon">🏠</span>首页</div>
      <div class="tab-item"><span class="icon">📊</span>记录</div>
      <div class="tab-item"><span class="icon">💬</span>树洞</div>
      <div class="tab-item"><span class="icon">👤</span>我的</div>
    </div>
  </div>
</div>
</body>
</html>
