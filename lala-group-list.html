<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>拉了吗 — 好友</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:#faf5ee;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23e0d5c5' stroke-width='.5' fill='none'/%3E%3C/svg%3E")}
.fun{font-family:'ZCOOL KuaiLe',cursive}
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.safe-top{padding-top:max(env(safe-area-inset-top),20px)}
.safe-bottom{padding-bottom:max(env(safe-area-inset-bottom),16px)}
</style>
</head>
<body class="flex flex-col h-full">
<div class="flex-1 scroll-area safe-top px-5 pb-4">
  <!-- Header -->
  <div class="flex justify-between items-center mt-2 mb-4">
    <h1 class="fun text-[28px] text-[#5a3e28] rotate-1">好友 👫</h1>
    <div class="flex gap-2">
      <a href="lala-group-join.html" class="bg-white border-2 border-[#c9b99a] rounded-full px-3 py-1 text-[12px] text-[#5a3e28] fun no-underline">加入</a>
      <a href="lala-group-create.html" class="bg-[#f0b860] border-2 border-[#5a3e28] rounded-full px-3 py-1 text-[12px] text-[#5a3e28] fun no-underline">+ 创建</a>
    </div>
  </div>

  <!-- 小组卡片 1 -->
  <a href="lala-group-detail.html" class="block no-underline">
    <div class="bg-white border-2 border-[#c9b99a] rounded-2xl p-4 mb-3 rotate-[0.3deg] active:scale-[.98] transition-transform">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-12 h-12 bg-[#f0b860]/20 rounded-2xl flex items-center justify-center text-[28px] border-2 border-[#c9b99a]">🔥</div>
        <div class="flex-1">
          <div class="fun text-[16px] text-[#5a3e28]">办公室畅通联盟</div>
          <div class="text-[11px] text-[#8a7560]">5 位成员 · 今日 3 人已打卡</div>
        </div>
        <span class="text-[#c9b99a]">›</span>
      </div>
      <!-- 成员头像 -->
      <div class="flex items-center gap-1 mb-2">
        <div class="w-7 h-7 bg-[#7cb342]/20 rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
        <div class="w-7 h-7 bg-[#f0b860]/20 rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
        <div class="w-7 h-7 bg-[#64b5f6]/20 rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
        <div class="w-7 h-7 bg-[#e57373]/20 rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
        <div class="w-7 h-7 bg-[#e8ddd0] rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
      </div>
      <!-- 本周挑战 -->
      <div class="bg-[#f0b860]/10 border border-[#f0b860]/30 rounded-xl px-3 py-2 flex items-center gap-2">
        <span class="text-[14px]">🎯</span>
        <span class="text-[11px] text-[#5a3e28]">本周挑战：谁最规律？</span>
        <span class="text-[10px] text-[#8a7560] ml-auto">还剩3天</span>
      </div>
    </div>
  </a>

  <!-- 小组卡片 2 -->
  <a href="lala-group-detail.html" class="block no-underline">
    <div class="bg-white border-2 border-[#c9b99a] rounded-2xl p-4 mb-3 -rotate-[0.2deg] active:scale-[.98] transition-transform">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-12 h-12 bg-[#7cb342]/10 rounded-2xl flex items-center justify-center text-[28px] border-2 border-[#c9b99a]">🌈</div>
        <div class="flex-1">
          <div class="fun text-[16px] text-[#5a3e28]">便秘互助小分队</div>
          <div class="text-[11px] text-[#8a7560]">3 位成员 · 今日 1 人已打卡</div>
        </div>
        <span class="text-[#c9b99a]">›</span>
      </div>
      <div class="flex items-center gap-1 mb-2">
        <div class="w-7 h-7 bg-[#7cb342]/20 rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
        <div class="w-7 h-7 bg-[#e8ddd0] rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
        <div class="w-7 h-7 bg-[#e8ddd0] rounded-full flex items-center justify-center text-[14px] border border-[#c9b99a]">💩</div>
      </div>
      <div class="bg-[#7cb342]/10 border border-[#7cb342]/30 rounded-xl px-3 py-2 flex items-center gap-2">
        <span class="text-[14px]">🍌</span>
        <span class="text-[11px] text-[#5a3e28]">本周挑战：完美排便王</span>
        <span class="text-[10px] text-[#8a7560] ml-auto">还剩3天</span>
      </div>
    </div>
  </a>

  <!-- 邀请提示 -->
  <div class="bg-white border-2 border-dashed border-[#c9b99a] rounded-2xl p-5 text-center mb-4 rotate-[0.5deg]">
    <div class="text-[36px] mb-2">🧻💩</div>
    <div class="fun text-[14px] text-[#5a3e28] mb-1">拉上好友一起来！</div>
    <div class="text-[11px] text-[#8a7560]">创建小组 → 分享邀请码 → 一起打卡</div>
  </div>
</div>

<!-- Tab Bar -->
<div class="bg-[#faf5ee]/90 backdrop-blur-md border-t-2 border-dashed border-[#c9b99a] flex justify-around pt-2 safe-bottom">
  <a href="lala-v2-home.html" class="text-center text-[#8a7560] no-underline"><span class="text-[22px] block">🏠</span><span class="text-[11px]">首页</span></a>
  <a href="lala-v2-record.html" class="text-center text-[#8a7560] no-underline"><span class="text-[22px] block">📊</span><span class="text-[11px]">记录</span></a>
  <div class="text-center text-[#5a3e28]"><span class="text-[22px] block">👫</span><span class="text-[11px] font-bold">好友</span></div>
  <a href="lala-v2-profile.html" class="text-center text-[#8a7560] no-underline"><span class="text-[22px] block">👤</span><span class="text-[11px]">我的</span></a>
</div>
</body>
</html>
