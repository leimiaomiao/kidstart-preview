<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>孕肚时光机 · Prototype v3</title>
<!-- v3 build 20260331-1607 -->
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Display','PingFang SC',sans-serif;background:#FFF;color:#1D1D1F;max-width:430px;margin:0 auto;height:100dvh;overflow:hidden;position:relative}

/* SVG icon helper */
.ico{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:middle}
.ico svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* Screens */
.s{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .4s ease-out,opacity .35s ease-out;will-change:transform,opacity;overflow:hidden}
.s.hide{transform:translateX(100%);opacity:0;pointer-events:none}
.s.on{transform:translateX(0);opacity:1;pointer-events:auto}
.s.left{transform:translateX(-30%);opacity:.4;pointer-events:none}

.bar{height:54px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:14px;font-weight:600;color:#1D1D1F}
.btn{background:#1D1D1F;color:#FFF;border:none;border-radius:14px;padding:16px 0;width:100%;font-size:17px;font-weight:600;cursor:pointer;transition:transform .12s;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97);opacity:.85}
.btn-o{background:#FFF;color:#1D1D1F;border:1.5px solid #E5E5EA;border-radius:14px;padding:14px 0;width:100%;font-size:15px;font-weight:500;cursor:pointer;transition:transform .12s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-o:active{transform:scale(.97)}
.link{background:none;border:none;color:#007AFF;font-size:14px;cursor:pointer}

/* === Tab Bar === */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:83px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.08);display:flex;z-index:50;padding-bottom:20px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#86868B;transition:color .2s;-webkit-tap-highlight-color:transparent}
.tab.on{color:#007AFF}
.tab-ico{font-size:24px}
.tab-lbl{font-size:10px;font-weight:500}

/* === Nav Bar (top) === */
.navbar{height:44px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;background:#FFF}
.navbar-dark{background:transparent}
.nav-left,.nav-right{width:80px;display:flex;align-items:center}
.nav-right{justify-content:flex-end}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:600}
.nav-btn{background:none;border:none;color:#007AFF;font-size:17px;cursor:pointer;display:flex;align-items:center;gap:4px}

/* === Preview === */
.pv-wrap{flex:1;display:flex;flex-direction:column;background:#FFF;overflow:hidden}
.pv-gallery{flex:1;position:relative;overflow:hidden}
.pv-strip{display:flex;gap:12px;align-items:center;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);animation:pvScroll 14s linear infinite}
@keyframes pvScroll{0%{transform:translate(-50%,-50%) translateX(0)}100%{transform:translate(-50%,-50%) translateX(-344px)}}
.pv-card{width:160px;height:280px;border-radius:16px;flex-shrink:0;overflow:hidden;position:relative;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.pv-card-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.pv-card-label{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(0deg,rgba(0,0,0,.4) 0%,transparent 100%);color:#FFF;font-size:12px;font-weight:600}

/* === Home === */
.hm-wrap{flex:1;display:flex;flex-direction:column;background:#FAFAFA;overflow:hidden;padding-bottom:83px}
.hm-hero{position:relative;height:52%;flex-shrink:0;overflow:hidden;background:#000}
.hm-bg{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hm-carousel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;touch-action:pan-y}
.hm-track{display:flex;align-items:center;gap:14px;transition:transform .4s ease-out;will-change:transform}
.hm-card{width:180px;height:310px;border-radius:14px;flex-shrink:0;overflow:hidden;position:relative;transition:all .4s ease-out;background:#D9D9D9}
.hm-card.ctr{width:220px;height:380px;border-radius:16px;box-shadow:0 12px 17px rgba(0,0,0,.14),0 20px 40px rgba(0,0,0,.3)}
.hm-card.sd{opacity:.7;transform:scale(.9)}
.hm-card-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:rgba(255,255,255,.3)}
.hm-card-ov{position:absolute;left:0;right:0;bottom:0;height:120px;background:linear-gradient(0deg,rgba(0,0,0,.45) 0%,transparent 100%)}
.hm-card-info{position:absolute;left:14px;bottom:16px;z-index:2}
.hm-card-wk{font-size:18px;font-weight:600;color:#FFF;text-shadow:0 2px 6px rgba(0,0,0,.3)}
.hm-card-dt{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.hm-card-bdg{position:absolute;top:10px;left:10px;z-index:2;background:rgba(255,255,255,.55);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);padding:2px 8px;border-radius:6px;font-size:10px;color:#141414}
.hm-dots{display:flex;justify-content:center;gap:5px;padding:10px 0}
.hm-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s}
.hm-dot.on{width:16px;border-radius:3px;background:#FFF}
.hm-glow{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:260px;height:60px;background:rgba(68,154,221,.15);filter:blur(40px);pointer-events:none}
.hm-bottom{flex:1;display:flex;flex-direction:column;padding:14px 20px;gap:10px;justify-content:center}
.hm-wk-info{display:flex;align-items:center;gap:12px}
.hm-wk-ring{width:44px;height:44px;border-radius:50%;border:3px solid #34C759;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#34C759}

/* === Camera === */
.cm-w{flex:1;display:flex;flex-direction:column;background:#000}
.cm-vf{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cm-sil{position:absolute;width:200px;height:360px}
.cm-sil-head{width:48px;height:48px;border:1.5px solid rgba(255,255,255,.18);border-radius:50%;position:absolute;top:8%;left:50%;transform:translateX(-50%)}
.cm-sil-torso{width:60px;height:100px;border:1.5px solid rgba(255,255,255,.18);border-radius:30px 30px 20px 20px;position:absolute;top:22%;left:42%;transform:rotate(-5deg)}
.cm-sil-belly{width:80px;height:80px;border:1.5px dashed rgba(255,255,255,.3);border-radius:50%;position:absolute;top:32%;left:52%;display:flex;align-items:center;justify-content:center}
.cm-sil-legs{width:30px;height:120px;border-left:1.5px solid rgba(255,255,255,.12);border-right:1.5px solid rgba(255,255,255,.12);position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
.cm-sil-feet{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.35);white-space:nowrap;display:flex;align-items:center;gap:4px}
.cm-ghost{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:.12}
.cm-pill{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:5px 16px;border-radius:20px;font-size:14px;font-weight:600;color:#1D1D1F}
.cm-hint{position:absolute;bottom:108px;left:50%;transform:translateX(-50%);text-align:center;font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}
.cm-bar{height:100px;background:#000;display:flex;align-items:center;justify-content:center;gap:44px;flex-shrink:0}
.cm-shut{width:72px;height:72px;border-radius:50%;border:4px solid #FFF;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s}
.cm-shut:active{transform:scale(.92)}
.cm-shut-in{width:56px;height:56px;border-radius:50%;background:#FFF}
.cm-side{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:22px;color:#FFF;cursor:pointer}
.cm-side:active{transform:scale(.9)}
.cm-icn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;color:#FFF;cursor:pointer;position:absolute}
.cm-icn:active{transform:scale(.88)}
.cm-flash{position:absolute;inset:0;background:#FFF;opacity:0;pointer-events:none}

/* === Done === */
.dn-wrap{flex:1;display:flex;flex-direction:column;align-items:center;background:#FFF;padding:0 24px;overflow-y:auto;padding-bottom:40px}
.dn-card{width:100%;max-width:300px;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.1);margin-bottom:20px}
.dn-card-img{width:100%;height:260px;display:flex;align-items:center;justify-content:center}
.dn-card-info{padding:20px;text-align:center;background:#FFF}
.dn-mile{background:#F2F2F7;border-radius:12px;padding:14px;width:100%;max-width:300px;text-align:center;margin-bottom:16px}

/* === Video === */
.vd-w{flex:1;display:flex;flex-direction:column;background:#000}
.vd-player{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
.vd-play{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:20px;color:#FFF;cursor:pointer;border:1px solid rgba(255,255,255,.1)}
.vd-play:active{transform:scale(.92)}
.vd-ctrl{background:rgba(0,0,0,.9);backdrop-filter:blur(20px);padding:20px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
.vd-prog{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:8px}
.vd-prog-fill{height:100%;background:#FFF;border-radius:2px;width:0;transition:width 20s linear}
.vd-chip{padding:8px 16px;border-radius:20px;font-size:13px;white-space:nowrap;background:rgba(255,255,255,.06);color:#86868B;cursor:pointer;border:1px solid rgba(255,255,255,.04);transition:.2s}
.vd-chip.on{background:rgba(255,255,255,.12);color:#FFF;border-color:rgba(255,255,255,.15)}

/* === Settings === */
.st-w{flex:1;display:flex;flex-direction:column;background:#F2F2F7;overflow-y:auto;padding-bottom:83px}
.st-grp{background:#FFF;border-radius:12px;overflow:hidden;margin:8px 16px}
.st-r{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid #F2F2F7;font-size:15px}
.st-r:last-child{border-bottom:none}
.st-v{font-size:15px;color:#86868B;display:flex;align-items:center;gap:4px}
.tog{width:51px;height:31px;background:#34C759;border-radius:16px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.tog::after{content:'';width:27px;height:27px;background:#FFF;border-radius:50%;position:absolute;right:2px;top:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tog.off{background:#E5E5EA}.tog.off::after{transform:translateX(-20px)}
</style>
</head>
<body>

<div id="s0" class="s on">
<div class="bar">9:41</div>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">
<div style="font-size:72px;margin-bottom:20px;color:#1D1D1F"><span class="ico" style="font-size:72px"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><path d="M12 8c-2 0-3.5 1.5-3.5 3.5v1c0 2 .5 4 1.5 5.5h4c1-1.5 1.5-3.5 1.5-5.5v-1C15.5 9.5 14 8 12 8z"/><path d="M9 18l-1 3h8l-1-3"/></svg></span></div>
<div style="font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px">孕肚时光机</div>

</div>

</div>
</div>

<div id="s1b" class="s hide">

</div>

<div id="s2" class="s hide">
